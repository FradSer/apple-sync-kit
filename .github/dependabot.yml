version: 2
updates:
  - package-ecosystem: swift
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(src)"
    groups:
      swift-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
