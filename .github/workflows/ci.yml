name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v7
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify code is formatted
        run: |
          swift format --in-place --recursive Sources Tests
          git diff --exit-code

  test-linux:
    name: Test (Linux, Swift 6.2)
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v7
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: linux-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: linux-spm-
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test --skip-build

  test-macos:
    name: Test (macOS 14, Swift 6.2)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Swift version
        run: swift --version
      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: macos-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: macos-spm-
      - name: Build
        run: swift build --build-tests
      - name: Test
        run: swift test --skip-build
