name = "apple-sync-worker"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[vars]
# The kit ships no business migrations. The test runtime serves only the
# synthetic fixture table used by the entity-agnostic test suite.
ENTITIES = "kit_test_items"

[[d1_databases]]
binding = "DB"
database_name = "apple-sync-test"
database_id = "test"
migrations_dir = "test/fixtures/migrations"

[triggers]
crons = ["0 3 * * *"]
